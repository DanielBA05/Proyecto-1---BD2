<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Citas doctor</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <h1>Mis citas</h1>
    <h3 th:text="'Bienvenido, ' + ${nombreUsuario}"></h3>
    <div class="alert error" th:if="${error}" th:text="${error}"></div>
    <div class="alert success" th:if="${success}" th:text="${success}"></div>

    <table>
        <tr>
            <th>ID</th>
            <th>Inicio</th>
            <th>Fin</th>
            <th>Estado</th>
            <th>Paciente</th>
            <th>Acciones</th>
        </tr>

        <tr th:each="c : ${citas}">
            <td th:text="${c.id}"></td>
            <td th:text="${#temporals.format(c.inicioCita, 'dd/MM/yyyy HH:mm')}"></td>
            <td th:text="${#temporals.format(c.finCita, 'HH:mm')}"></td>
            <td th:text="${c.estadoCita}"></td>
            <td th:text="${c.paciente != null ? c.paciente.usuario.nombre + ' ' + c.paciente.usuario.apellido1 : 'Sin reservar'}"></td>

            <td class="actions-inline">
                <form th:if="${c.estadoCita.name() != 'CANCELADA' and c.estadoCita.name() != 'ATENDIDA' and c.estadoCita.name() != 'AUSENTE'}"
                      th:action="@{'/doctor/citas/' + ${c.id} + '/cancelar'}"
                      method="post">
                    <button type="submit">Cancelar</button>
                </form>

                <form th:if="${c.estadoCita.name() == 'RESERVADA'}"
                      th:action="@{'/doctor/citas/' + ${c.id} + '/atendida'}"
                      method="post">
                    <button type="submit">Atendida</button>
                </form>

                <form th:if="${c.estadoCita.name() == 'RESERVADA'}"
                      th:action="@{'/doctor/citas/' + ${c.id} + '/ausente'}"
                      method="post">
                    <button type="submit">Ausente</button>
                </form>

                <span th:if="${c.estadoCita.name() == 'CANCELADA' or c.estadoCita.name() == 'ATENDIDA' or c.estadoCita.name() == 'AUSENTE'}">
                    -
                </span>
            </td>
        </tr>
    </table>

    <a th:href="@{/doctor}">Volver</a>
</div>
</body>
</html>
